<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena of Valor: Lite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-wrap">
    <canvas id="arena" width="960" height="540"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-top">
        <div class="tower-count ally">
          <span class="dot"></span> Trụ: <span id="allyTowers">2</span>
        </div>
        <div class="timer" id="timer">00:00</div>
        <div class="tower-count enemy">
          Trụ: <span id="enemyTowers">2</span> <span class="dot"></span>
        </div>
      </div>

      <div id="hud-bottom">
        <div id="stat-bars">
          <div class="bar-row">
            <span class="bar-label">HP</span>
            <div class="bar hp"><div id="hpFill" class="fill"></div><span id="hpText" class="bar-text"></span></div>
          </div>
          <div class="bar-row">
            <span class="bar-label">MP</span>
            <div class="bar mp"><div id="mpFill" class="fill"></div><span id="mpText" class="bar-text"></span></div>
          </div>
        </div>

        <div id="skills">
          <div class="skill" id="skillQ" data-key="Q"><span class="key">Q</span><span class="name">Lao Tới</span><div class="cd-overlay"></div></div>
          <div class="skill" id="skillE" data-key="E"><span class="key">E</span><span class="name">Cầu Lửa</span><div class="cd-overlay"></div></div>
          <div class="skill" id="skillR" data-key="R"><span class="key">R</span><span class="name">Khiên</span><div class="cd-overlay"></div></div>
          <div class="skill" id="skillAA" data-key="SPACE"><span class="key">␣</span><span class="name">Đánh</span><div class="cd-overlay"></div></div>
        </div>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="overlay-screen">
      <h1>ARENA <span>OF VALOR</span> LITE</h1>
      <p>Đấu trường 1v1 tối giản. Phá trụ, hạ gục Nexus địch.</p>
      <div class="controls-hint">
        <div><b>WASD</b> — di chuyển</div>
        <div><b>SPACE</b> — đánh thường</div>
        <div><b>Q</b> — lao tới &nbsp; <b>E</b> — cầu lửa &nbsp; <b>R</b> — khiên hồi máu</div>
      </div>
      <button id="startBtn">Bắt đầu trận</button>
    </div>

    <!-- End Screen -->
    <div id="endScreen" class="overlay-screen hidden">
      <h1 id="endTitle">CHIẾN THẮNG</h1>
      <p id="endSub"></p>
      <button id="restartBtn">Chơi lại</button>
    </div>
  </div>

<script src="game.js"></script>
</body>
</html>
